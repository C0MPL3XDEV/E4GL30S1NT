name: Build binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: eagleosint-linux
          - os: windows-latest
            artifact: eagleosint-windows.exe
          - os: macos-latest
            artifact: eagleosint-macos

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build binary
        run: uv run pyinstaller eagleosint.spec

      - name: Rename output (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv dist/eagleosint dist/${{ matrix.artifact }}

      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        run: mv dist/eagleosint.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true